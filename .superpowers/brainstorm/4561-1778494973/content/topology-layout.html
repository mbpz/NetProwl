<h2>设备拓扑图布局</h2>
<p class="subtitle">Canvas 绘制，选择布局方式</p>

<div class="options">
  <div class="option" data-choice="radial" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>星形（推荐）</h3>
      <p>中心路由器，周围设备环绕。适合家宽/小型网络。</p>
    </div>
  </div>
  <div class="option" data-choice="grid" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>网格</h3>
      <p>设备按发现顺序平铺网格。适合设备多、关系扁平的网络。</p>
    </div>
  </div>
  <div class="option" data-choice="linear" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>线性</h3>
      <p>水平滚动，IP 顺序排列。适合理解 IP 段分布。</p>
    </div>
  </div>
</div>
