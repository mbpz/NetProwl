<h2>设备图标风格</h2>
<p class="subtitle">按类型区分设备，选择图标风格</p>

<div class="options">
  <div class="option" data-choice="flat" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>扁平图标</h3>
      <p>纯色块+简单轮廓，体积小，适合小程序。</p>
    </div>
  </div>
  <div class="option" data-choice="outline" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>线性图标</h3>
      <p>线条勾勒，轻量感，现代简洁。</p>
    </div>
  </div>
  <div class="option" data-choice="colorful" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>彩色图标</h3>
      <p>品牌色填充，视觉丰富，但增加认知负担。</p>
    </div>
  </div>
</div>
