<h2>设备详情交互</h2>
<p class="subtitle">点击设备节点后的展开方式</p>

<div class="options">
  <div class="option" data-choice="drawer" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>抽屉面板</h3>
      <p>从底部滑出详情面板，不离开拓扑图。</p>
    </div>
  </div>
  <div class="option" data-choice="modal" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>弹窗 Modal</h3>
      <p>居中弹窗，聚焦详情，可多任务切换。</p>
    </div>
  </div>
  <div class="option" data-choice="inline" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>内嵌展开</h3>
      <p>节点原地展开子信息，拓扑结构保持。</p>
    </div>
  </div>
</div>
