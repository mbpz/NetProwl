name: netprowl-mini Build

on:
  push:
    branches: [main]
    paths:
      - 'netprowl-mini/**'
      - 'rs-core/**'
  pull_request:
    paths:
      - 'netprowl-mini/**'
      - 'rs-core/**'

jobs:
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM
        run: wasm-pack build rs-core --target web --out-dir pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rs-core-wasm
          path: rs-core/pkg/

  build-mini:
    name: Build Mini Program
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: rs-core-wasm
          path: rs-core/pkg/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd netprowl-mini && npm install --force

      - name: Build WeChat mini program
        run: cd netprowl-mini && npm run build:weapp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netprowl-mini-dist
          path: netprowl-mini/dist/
