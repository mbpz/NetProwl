name: netprowl-pc Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'netprowl-pc/**'
      - 'core/**'
  pull_request:
    paths:
      - 'netprowl-pc/**'
      - 'core/**'
  release:
    types: [published]

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: netprowl-pc/package-lock.json

      - name: Install dependencies
        run: |
          cd netprowl-pc
          npm cache clean --force 2>/dev/null || true
          npm install

      - name: Build Tauri app
        run: |
          set -x
          pwd
          ls package.json 2>/dev/null && echo "At root" || echo "Not at root"
          cd netprowl-pc && pwd && ls package.json
          npm run build
          npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: netprowl-pc/package-lock.json

      - name: Install dependencies
        run: |
          cd netprowl-pc
          npm cache clean --force 2>/dev/null || true
          npm install

      - name: Build Tauri app
        run: |
          cd netprowl-pc
          npm run tauri build -- --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find .app bundle
        id: find-app
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"

      - name: Ad-hoc sign and clear quarantine
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          echo "Signing: $APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          echo "Clearing quarantine..."
          xattr -rd com.apple.quarantine "$APP_PATH"
          echo "Done."

      - name: Package as tar.gz
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          APP_NAME=$(basename "$APP_PATH")
          cd $(dirname "$APP_PATH")
          tar -czvf "NetProwl-${{ matrix.arch }}.tar.gz" "$APP_NAME"
          ls -lh "NetProwl-${{ matrix.arch }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netprowl-macos-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/NetProwl-${{ matrix.arch }}.tar.gz
          retention-days: 7

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-macos
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create dev tag
        id: tag
        run: |
          VERSION=$(node -p "require('./netprowl-pc/package.json').version")
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          TAG_NAME="v${VERSION}-dev-${COMMIT_SHORT}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Created tag: $TAG_NAME"

  assemble-release:
    name: Assemble Release
    runs-on: ubuntu-latest
    needs: [build-macos, create-release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          name: ${{ needs.create-release.outputs.tag_name }}
          files: artifacts/netprowl-macos-arm64/*.tar.gz artifacts/netprowl-macos-x64/*.tar.gz
          draft: true
          prerelease: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
