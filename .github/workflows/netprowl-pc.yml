name: netprowl-pc Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'netprowl-pc/**'
      - 'core/**'
  pull_request:
    paths:
      - 'netprowl-pc/**'
      - 'core/**'
  release:
    types: [published]

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: netprowl-pc/package-lock.json

      - name: Install dependencies
        run: cd netprowl-pc && npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: netprowl-pc/package-lock.json

      - name: Install dependencies
        run: cd netprowl-pc && npm ci

      - name: Build Tauri app
        run: |
          cd netprowl-pc
          npm run tauri build -- --target aarch64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find .app bundle
        id: find-app
        run: |
          APP_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Ad-hoc sign and clear quarantine
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          echo "Signing: $APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          echo "Clearing quarantine..."
          xattr -rd com.apple.quarantine "$APP_PATH"
          echo "Done."

      - name: Package as tar.gz
        run: |
          APP_PATH="${{ steps.find-app.outputs.app_path }}"
          APP_NAME=$(basename "$APP_PATH")
          VERSION=${{ github.event.release.tag_name || github.ref_name }}
          TAR_NAME="NetProwl-${VERSION}-macos-arm64.tar.gz"

          cd $(dirname "$APP_PATH")
          tar -czvf "$TAR_NAME" "$APP_NAME"
          echo "tar_name=$TAR_NAME" >> $GITHUB_OUTPUT
          ls -lh "$TAR_NAME"

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-macos
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create dev tag
        id: tag
        run: |
          VERSION=$(node -p "require('./netprowl-pc/package.json').version")
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          TAG_NAME="v${VERSION}-dev-${COMMIT_SHORT}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Created tag: $TAG_NAME"

  bump-homebrew:
    name: Bump Homebrew Cask
    runs-on: ubuntu-latest
    needs: create-release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            homebrew-tap
          sparse-checkout-cone-mode: false

      - name: Update Homebrew formula
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.tag_name }}"
          # Create a PR to homebrew-cask using hub
          # Note: Requires HOMEBREW_GITHUB_API_TOKEN with repo access
          echo "Would bump Homebrew Cask with version: $VERSION"
          echo "This requires submitting a PR to https://github.com/Homebrew/homebrew-cask"
