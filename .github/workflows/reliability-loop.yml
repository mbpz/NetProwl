name: Reliability Loop

on:
  pull_request:
    paths:
      - "rs-core/**"
      - "netprowl-pc/**"
      - "scripts/reliability-loop.sh"
      - ".github/workflows/reliability-loop.yml"
  push:
    branches: [main]
    paths:
      - "rs-core/**"
      - "netprowl-pc/**"
      - "scripts/reliability-loop.sh"
      - ".github/workflows/reliability-loop.yml"

env:
  CARGO_INCREMENTAL: 0

jobs:
  reliability-loop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: netprowl-pc/package-lock.json

      - name: Install PC dependencies
        run: npm ci
        working-directory: netprowl-pc

      - name: Run reliability loop
        run: ./scripts/reliability-loop.sh
