services:
  netprowl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netprowl-pc
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - netprowl-data:/app/data
    network_mode: host
    privileged: true

volumes:
  netprowl-data: